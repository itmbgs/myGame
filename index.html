<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>My Letter Game</h2>
    <h3>Choose correct option.</h3>
    <h4></h4>
       
    <div class="question-container">
        <div class="box hindi">क</div>
        <div class="box english">K</div>
    </div>

    <div class="option-container">
            <button class="red option">kh</button>
            <button class="green option">k</button>
            <br>
            <button class="blue option">g</button>
            <button class="orange option">gh</button>
    </div>

    <div class="userResponse">
        <button class="answerButton">Answer</button>
        <button class="playAgain">Play Again</button>
    </div>


    <script src="app.js"></script>
</body>
</html>
